# use-grammars = { only = ["c", "cpp", "toml"] }

[language-server.clangd]
command = "clangd"
args = ["--fallback-style=webkit"]

[[language]]
name = "c"
indent = { tab-width = 4, unit = "    " }

[[language]]
name = "cpp"
indent = { tab-width = 4, unit = "    " }

[language-server.pyrefly]
command = "pyrefly"
args = ["lsp"]

[language-server.ruff]
command = "ruff"
args = ["server"]

[[language]]
name = "python"
language-servers = ["pyrefly", "ruff"]
